# Operator compose: готовый образ из GHCR, без исходников на диске.
# Версия: VERSION=stable (по умолчанию) или VERSION=1.0.0

services:
  db:
    image: postgres:15-alpine
    container_name: rumbleserver_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-rumbleserver_db}
      POSTGRES_USER: ${DB_USER:-rumbleserver_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rumbleserver_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rumbleserver_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rumbleserver_redis
    env_file:
      - .env
    command: sh -c "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - rumbleserver_network
    restart: unless-stopped

  web:
    image: ghcr.io/ivavalser/rumbleserver:${VERSION:-stable}
    container_name: rumbleserver_web
    command: daphne -b 0.0.0.0 -p 8000 --access-log /dev/null rumbleserver.asgi:application
    volumes:
      - static_volume:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rumbleserver_network
    restart: unless-stopped

  worker:
    image: ghcr.io/ivavalser/rumbleserver:${VERSION:-stable}
    container_name: rumbleserver_worker
    command: python messaging/redis_worker.py
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
      - web
    networks:
      - rumbleserver_network
    restart: unless-stopped

  push_worker:
    image: ghcr.io/ivavalser/rumbleserver:${VERSION:-stable}
    container_name: rumbleserver_push_worker
    command: python notifications/push_worker.py
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
      - web
    networks:
      - rumbleserver_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:

networks:
  rumbleserver_network:
    driver: bridge
