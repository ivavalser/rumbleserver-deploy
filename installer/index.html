<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMBL — Server Installer</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/favicon.ico" sizes="any">
  <link rel="icon" href="/assets/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/assets/favicon-16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #6E5BE9; --purple-light: #8B7CF0; --purple-dark: #5544CC;
      --navy: #1A1A2E; --navy-mid: #252542; --navy-deep: #13131f; --mint: #A8E6CF; --mint-dark: #2D4A3E;
      --white: #FFFFFF; --off-white: #F6F5F2;
      --gray-100: #F0EFEC; --gray-200: #E2E0DB; --gray-400: #9B978F; --gray-600: #6B6760; --gray-800: #2E2C28;
      --bg: var(--navy-deep);
      --surface: var(--navy-mid);
      --surface2: var(--navy);
      --border: rgba(255,255,255,.1);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.55);
      --accent: var(--purple); --accent-hover: var(--purple-light);
      --ok: var(--mint); --ok-bg: rgba(168,230,207,.12);
      --err: #f08080; --err-bg: rgba(240,128,128,.12);
      --radius: 14px; --font-heading: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    h1, h2, h3, h4 { font-family: var(--font-heading); }
    header {
      padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface2);
      display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-brand img { height: 32px; width: auto; }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 700; color: var(--text); }
    header p { margin: 2px 0 0; color: var(--muted); font-size: 0.85rem; }
    .header-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .lang-switch { display: flex; gap: 4px; background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
    .lang-switch button { border: none; background: transparent; color: var(--muted); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: var(--font-heading); }
    .lang-switch button.active { background: var(--purple); color: #fff; }
    .mode-badge {
      font-size: 0.78rem; font-weight: 600; padding: 6px 12px; border-radius: 100px;
      background: rgba(110,91,233,.18); color: var(--purple-light); border: 1px solid rgba(110,91,233,.35);
      font-family: var(--font-heading); cursor: pointer;
    }
    .mode-badge.paused { background: rgba(240,128,128,.12); color: var(--err); border-color: rgba(240,128,128,.3); }
    .layout { display: grid; grid-template-columns: 300px minmax(0, 1fr); min-height: calc(100vh - 65px); background: var(--bg); max-width: 100vw; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .sidebar { border-right: none; border-bottom: 1px solid var(--border); } }
    .sidebar { padding: 16px; border-right: 1px solid var(--border); background: var(--surface2); }
    .sidebar-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,.45); margin: 0 0 12px 4px; font-weight: 600; }
    .step-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 12px; margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; transition: background .2s; }
    .step-item:hover { background: var(--navy-mid); }
    .step-item.active { background: var(--navy-mid); border-color: rgba(110,91,233,.5); }
    .step-dot { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; background: rgba(255,255,255,.1); color: rgba(255,255,255,.5); font-family: var(--font-heading); }
    .step-item.done .step-dot { background: var(--mint); color: var(--mint-dark); }
    .step-item.error .step-dot { background: var(--err); color: #fff; }
    .step-item.active .step-dot { background: var(--purple); color: #fff; }
    .step-title { font-size: 0.88rem; font-weight: 600; color: rgba(255,255,255,.9); font-family: var(--font-heading); }
    .step-desc { font-size: 0.75rem; color: rgba(255,255,255,.45); margin-top: 2px; }
    main { padding: 24px; display: flex; flex-direction: column; gap: 16px; min-width: 0; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,.25); min-width: 0; max-width: 100%; }
    .panel h2, .panel h3 { margin: 0 0 8px; font-size: 1.25rem; color: var(--text); }
    .panel p.desc { margin: 0 0 16px; color: var(--muted); font-size: 0.92rem; line-height: 1.5; }
    .mascot-tip {
      display: flex; gap: 16px; align-items: flex-start; margin-bottom: 20px;
      padding: 16px 18px; background: rgba(110,91,233,.1); border: 1px solid rgba(110,91,233,.22); border-radius: 16px;
    }
    .mascot-tip img { width: 72px; height: 72px; flex-shrink: 0; object-fit: contain; }
    .mascot-tip p { margin: 0; font-size: 0.9rem; line-height: 1.55; color: var(--muted); }
    .mascot-tip p strong { color: var(--purple-light); font-family: var(--font-heading); display: block; margin-bottom: 4px; font-size: 0.82rem; }
    .status { padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.45; }
    .status.ok { background: var(--ok-bg); border: 1px solid rgba(168,230,207,.25); color: var(--ok); }
    .status.fail { background: var(--err-bg); border: 1px solid rgba(240,128,128,.25); color: var(--err); }
    .status.info { background: rgba(110,91,233,.14); border: 1px solid rgba(110,91,233,.28); color: var(--purple-light); }
    .done-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 100px; background: var(--ok-bg); color: var(--ok); font-weight: 600; font-size: 0.88rem; margin-bottom: 12px; font-family: var(--font-heading); }
    .manual { background: var(--navy-deep); border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.82rem; white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; margin-bottom: 16px; color: rgba(255,255,255,.7); max-width: 100%; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; margin-bottom: 0; }
    .form-actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0 20px; }
    button.btn { border: none; border-radius: var(--radius); padding: 12px 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: var(--font-heading); transition: background .2s, transform .15s, box-shadow .2s; }
    button.primary { background: var(--purple); color: #fff; box-shadow: 0 4px 16px rgba(110,91,233,.25); }
    button.primary:hover:not(:disabled) { background: var(--purple-light); transform: translateY(-1px); }
    button.secondary { background: rgba(255,255,255,.06); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover:not(:disabled) { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.18); }
    button.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 420px;
      margin-bottom: 16px;
    }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; color: var(--muted); }
    label .field-label { color: var(--muted); }
    label input, label select { width: 100%; }
    .password-field { display: flex; flex-direction: column; gap: 6px; }
    .password-field .field-label { color: var(--muted); font-size: 0.82rem; }
    .password-row { display: flex; gap: 8px; align-items: stretch; }
    .password-row input { flex: 1; min-width: 0; }
    .password-actions { display: flex; gap: 6px; flex-shrink: 0; }
    button.btn.compact { padding: 10px 12px; font-size: 0.82rem; white-space: nowrap; }
    .field-hint { font-size: 0.78rem; color: var(--muted); line-height: 1.4; margin-top: -4px; }
    input { background: var(--navy-deep); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 0.9rem; font-family: var(--font-body); }
    input:focus { outline: 2px solid rgba(110,91,233,.4); border-color: var(--purple); }
    input::placeholder { color: rgba(255,255,255,.35); }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 8px 0 12px; color: var(--text); font-size: 0.9rem; }
    .checkbox-row input { width: auto; }
    .log {
      flex: 1; width: 100%; max-width: 100%; min-width: 0;
      background: var(--navy-deep); border: 1px solid var(--border); border-radius: 12px; padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.78rem;
      overflow-x: hidden; overflow-y: auto;
      white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word;
      color: rgba(255,255,255,.5); max-height: 280px;
    }
    .hidden { display: none !important; }
    .mode-switch { display: flex; gap: 8px; margin-bottom: 0; flex-wrap: wrap; }
    .mode-switch label { flex-direction: row; align-items: center; gap: 8px; cursor: pointer; color: var(--text); font-size: 0.9rem; padding: 8px 12px; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 10px; }
    .mode-switch label:has(input:checked) { border-color: var(--purple); background: rgba(110,91,233,.16); }
    .mode-switch input { width: auto; }
    .env-form { display: flex; flex-direction: column; gap: 14px; }
    .env-section { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; }
    .env-section-title { margin: 0 0 6px; font-size: 0.98rem; font-weight: 600; color: var(--text); font-family: var(--font-heading); }
    .env-section-lead { margin: 0 0 14px; color: var(--muted); font-size: 0.85rem; line-height: 1.5; }
    .env-inner { margin-top: 12px; padding: 12px 14px; background: var(--navy-deep); border: 1px solid var(--border); border-radius: 12px; }
    .env-inner-title { margin: 0 0 8px; font-size: 0.88rem; font-weight: 600; color: var(--text); }
    select { background: var(--navy-deep); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 0.9rem; font-family: var(--font-body); }
    select:focus { outline: 2px solid rgba(110,91,233,.35); border-color: var(--purple); }
    .status-list { margin: 12px 0 16px; }
    .status-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 0.9rem; }
    .status-item.ok { color: var(--ok); }
    .status-item.fail { color: var(--err); }
    .aws-block { border: none; border-radius: 0; padding: 0; margin-top: 0; }
    .aws-block h4 { display: none; }
    .dns-block { border: none; border-radius: 0; padding: 0; margin-top: 0; }
    .dns-block h4 { display: none; }
    .dns-block p { margin: 0 0 10px; color: var(--muted); font-size: 0.85rem; line-height: 1.45; }
    .dns-table { width: 100%; font-size: 0.85rem; border-collapse: collapse; margin-bottom: 10px; }
    .dns-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .dns-table td:first-child { color: var(--muted); width: 72px; white-space: nowrap; }
    .dns-table code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.82rem; color: var(--purple-light); }
    #env-dns-status.ok, #nginx-dns-status.ok, #aws-access-status.ok { color: var(--ok); }
    #env-dns-status.fail, #nginx-dns-status.fail, #aws-access-status.fail { color: var(--err); }
    #aws-access-status, #env-dns-status, #nginx-dns-status { font-size: 0.85rem; margin-top: 4px; }
    .link-row { margin: 10px 0; }
    .link-row a { color: var(--purple-light); }
    .guide-callout {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 18px 20px; margin-bottom: 20px;
      background: linear-gradient(135deg, rgba(110,91,233,.24), rgba(168,230,207,.1));
      border: 2px solid rgba(110,91,233,.5); border-radius: 16px;
      box-shadow: 0 4px 24px rgba(110,91,233,.15);
    }
    .guide-callout-step {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--purple); color: #fff; font-weight: 700; font-size: 1rem;
      font-family: var(--font-heading);
    }
    .guide-callout-body { flex: 1; min-width: 0; }
    .guide-callout-body strong {
      display: block; font-size: 1rem; color: var(--text); margin-bottom: 6px;
      font-family: var(--font-heading);
    }
    .guide-callout-body p { margin: 0 0 14px; font-size: 0.88rem; color: var(--muted); line-height: 1.55; }
    .guide-callout-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 22px; background: var(--purple); color: #fff !important;
      border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 0.92rem;
      font-family: var(--font-heading); box-shadow: 0 4px 18px rgba(110,91,233,.4);
      transition: background .2s, transform .15s;
    }
    .guide-callout-btn:hover { background: var(--purple-light); transform: translateY(-1px); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: -2px;
      margin-right: 6px;
    }
    .aws-verify-progress {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(110,91,233,.12);
      border: 1px solid rgba(110,91,233,.25);
      border-radius: 8px;
    }
    .verify-step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.35;
    }
    .verify-step.active { color: var(--purple); }
    .verify-step.done { color: var(--ok); }
    .verify-step.fail { color: var(--err); }
    .verify-step .mark { width: 16px; flex-shrink: 0; text-align: center; }
    .env-form.aws-form-root { position: relative; }
    .aws-busy-overlay {
      position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start; padding-top: 48px; gap: 12px;
      background: rgba(19,19,31,.88); border-radius: 16px; color: var(--text);
      font-size: 0.92rem; font-weight: 600; cursor: wait;
    }
    .aws-busy-overlay img { width: 80px; height: 80px; }
    .panel.aws-step-locked .actions button { pointer-events: none; opacity: 0.55; }
    #aws-provision-btn.btn.primary {
      box-shadow: 0 4px 22px rgba(110,91,233,.45);
      font-size: 0.95rem;
      padding: 14px 24px;
    }
    #aws-provision-btn.btn.primary:hover:not(:disabled) {
      box-shadow: 0 6px 28px rgba(110,91,233,.55);
    }
    #step-panel { position: relative; }
    .step-hero { position: relative; z-index: 20; }
    .step-body { position: relative; min-height: 140px; }
    .step-busy-overlay {
      position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start; padding: 48px 32px 32px; gap: 14px;
      background: rgba(19,19,31,.9); border-radius: 0 0 20px 20px; color: var(--text);
      font-size: 0.92rem; font-weight: 600; cursor: wait;
    }
    .step-busy-overlay img { width: 96px; height: 96px; animation: mascotFloat 6s ease-in-out infinite; }
    .step-busy-label { display: flex; align-items: center; gap: 8px; text-align: center; line-height: 1.4; max-width: 90%; }
    .busy-dots::after { content: '…'; animation: busyPulse 1.2s ease-in-out infinite; }
    @keyframes busyPulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    .step-busy-log {
      max-width: min(560px, 90%); font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.75rem; font-weight: 400; color: rgba(255,255,255,.42);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;
    }
    .panel.step-busy .actions button { pointer-events: none; opacity: 0.55; }
    .finish-panel { display: flex; flex-direction: column; gap: 16px; margin: 0; }
    .finish-loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.9rem; padding: 8px 0; }
    .finish-hero {
      display: flex; gap: 20px; align-items: center; padding: 24px;
      border-radius: 20px; border: 1px solid rgba(168,230,207,.3); background: var(--ok-bg);
    }
    .finish-hero.warn { border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.08); }
    .finish-hero img { width: 100px; height: 100px; flex-shrink: 0; }
    .finish-hero-text h3 { margin: 0 0 6px; font-size: 1.35rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .finish-hero-text p { margin: 0; color: var(--muted); font-size: 0.92rem; line-height: 1.5; }
    .finish-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
    .finish-card {
      background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px;
    }
    .finish-card h4 { margin: 0 0 10px; font-size: 0.92rem; font-weight: 600; color: var(--text); font-family: var(--font-heading); }
    .finish-card h4:last-child { margin-bottom: 0; }
    .finish-admin-link {
      display: inline-block; margin-top: 10px; padding: 12px 20px; background: var(--purple); color: #fff;
      border-radius: var(--radius); text-decoration: none; font-weight: 600; font-size: 0.9rem; font-family: var(--font-heading);
      box-shadow: 0 4px 16px rgba(110,91,233,.25);
    }
    .finish-admin-link:hover { background: var(--purple-light); }
    .finish-meta { font-size: 0.85rem; color: var(--muted); line-height: 1.65; }
    .finish-meta code { color: var(--purple-light); font-size: 0.82rem; word-break: break-all; }
    .finish-commands {
      margin: 0; padding: 12px 14px; background: var(--navy-deep); border: 1px solid var(--border); border-radius: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.78rem;
      white-space: pre-wrap; color: rgba(255,255,255,.7); line-height: 1.5;
      overflow-x: auto;
    }
    #step-panel:has(.finish-panel) .actions {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    #step-panel.finish-step .desc,
    #step-panel.finish-step #step-status { display: none; }
    /* Start screen */
    #screen-start { min-height: 100vh; background: var(--navy); position: relative; overflow: hidden; }
    #screen-wizard { min-height: 100vh; background: var(--bg); }
    #screen-shutdown, #screen-loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
    .shutdown-card { text-align: center; max-width: 480px; padding: 40px; background: var(--surface); border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 12px 40px rgba(0,0,0,.35); }
    .shutdown-card img { width: 120px; height: 120px; margin-bottom: 20px; }
    .shutdown-card h2 { margin: 0 0 8px; color: var(--text); font-size: 1.5rem; }
    .shutdown-card p { margin: 0; color: var(--muted); line-height: 1.5; }
    .hero { position: relative; min-height: auto; display: flex; align-items: center; padding: 56px 0 28px; overflow: hidden; }
    .hero-bg-shapes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .hero-shape { position: absolute; border-radius: 50%; opacity: 0.08; filter: blur(100px); }
    .hero-shape-1 { width: 600px; height: 600px; background: var(--purple); top: -200px; right: -100px; }
    .hero-shape-2 { width: 400px; height: 400px; background: var(--mint); bottom: -100px; left: -100px; }
    .hero-shape-3 { width: 300px; height: 300px; background: var(--purple-light); top: 50%; left: 40%; }
    .hero-content { max-width: 960px; margin: 0 auto; padding: 0 32px; display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 32px; position: relative; z-index: 1; width: 100%; }
    .hero-headline { font-family: var(--font-heading); font-size: clamp(28px, 4vw, 42px); font-weight: 700; color: white; letter-spacing: -0.03em; line-height: 1.1; margin: 0; white-space: pre-line; }
    .hero-sub { font-size: clamp(14px, 1.8vw, 16px); color: rgba(255,255,255,.65); line-height: 1.55; max-width: 420px; margin: 12px 0 0; }
    .hero-mascot { position: relative; display: flex; justify-content: center; }
    .hero-mascot-glow { position: absolute; width: 70%; height: 70%; border-radius: 50%; background: radial-gradient(circle, rgba(110,91,233,.25), transparent 70%); filter: blur(40px); }

    async function runPreflightCheck() {
      const domain = document.getElementById('preflight-domain')?.value?.trim() || '';
      const key = document.getElementById('preflight-key')?.value?.trim() || '';
      if (!domain) { alert(t('domainRequired')); return; }
      if (!key) { alert(t('ghcrKeyPh')); return; }
      const btn = document.getElementById('preflight-check-btn');
      const installBtn = document.getElementById('preflight-install-btn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>' + esc(t('preflightChecking')); }
      preflightOk = false;
      if (installBtn) installBtn.disabled = true;
      try {
        const res = await api('/api/preflight/check', {
          method: 'POST',
          body: JSON.stringify({ domain, ghcr_key: key, ghcr_user: 'rmbldeploy' }),
        });
        const data = await res.json();
        renderPreflightChecks(data.data?.checks || []);
        preflightOk = !!data.ok;
        if (installBtn) installBtn.disabled = !preflightOk;
        if (data.message) {
          const checksEl = document.getElementById('preflight-checks');
          if (checksEl && !checksEl.classList.contains('hidden')) {
            checksEl.insertAdjacentHTML('beforeend',
              `<div class="status-item ${data.ok ? 'ok' : 'fail'}" style="margin-top:8px;font-weight:600">${esc(data.ok ? t('preflightCheckOk') : t('preflightCheckFail'))}</div>`);
          }
        }
      } catch (e) {
        alert(t('error') + ': ' + e.message);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = t('preflightCheck'); }
      }
    }

    async function runPreflightInstall() {
      if (!preflightOk) return;
      const domain = document.getElementById('preflight-domain')?.value?.trim() || '';
      const key = document.getElementById('preflight-key')?.value?.trim() || '';
      const btn = document.getElementById('preflight-install-btn');
      if (btn) btn.disabled = true;
      try {
        const res = await api('/api/preflight/save', {
          method: 'POST',
          body: JSON.stringify({ domain, ghcr_key: key, ghcr_user: 'rmbldeploy' }),
        });
        const data = await res.json();
        if (!data.ok) {
          renderPreflightChecks(data.data?.checks || []);
          alert(data.message || t('error'));
          preflightOk = false;
          return;
        }
        await refreshState(true);
        renderStartScreen();
        showScreen('start');
      } catch (e) {
        alert(t('error') + ': ' + e.message);
      } finally {
        if (btn) btn.disabled = !preflightOk;
      }
    }

    function dnsHintFor(domain) {
      const d = (domain || '').trim();
      const parts = d.split('.').filter(Boolean);
      let name = '@';
      let isSubdomain = false;
      if (parts.length >= 3) {
        name = parts[0];
        isSubdomain = true;
      }
      return {
        type: 'A',
        name,
        host: d || 'example.com',
        value: state?.public_ip || '',
        ttl: '300',
        isSubdomain,
      };
    }

    function fmt(str, vars) {
      return String(str).replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? '');
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function countdown(ms, onTick) {
      let left = Math.ceil(ms / 1000);
      onTick(left);
      while (left > 0) {
        await sleep(1000);
        left -= 1;
        onTick(Math.max(left, 0));
      }
    }

    let awsOperation = null;

    function isAwsStepBusy() {
      return busy || !!awsOperation;
    }

    function isApplyBusy() {
      return busy && busyAction === 'apply' && currentStepId !== 'aws' && !awsOperation;
    }

    function defaultStepBusyLabel() {
      const key = BUSY_LABEL_KEYS[currentStepId];
      return key ? t(key) : t('working');
    }

    function initialApplyBusyLabel() {
      if (currentStepId === 'nginx') return t('nginxInstalling');
      if (currentStepId === 'deploy') return t('deployPulling');
      return defaultStepBusyLabel();
    }

    async function runAutoFlow() {
      if (autoRunning || autoPaused || state?.install_mode !== 'auto') return;
      if (busy || isAwsStepBusy()) return;
      const step = state?.steps?.find(s => s.id === currentStepId);
      if (!step || step.id === 'finish') return;

      if (step.status === 'done') {
        const idx = state.steps.findIndex(s => s.id === currentStepId);
        if (idx >= 0 && idx < state.steps.length - 1) {
          currentStepId = state.steps[idx + 1].id;
          lastFormStepId = null;
          viewingDoneStep = false;
          renderStepList();
          renderCurrentStep();
          setTimeout(runAutoFlow, 350);
        }
        return;
      }

      if (isFormStep(step.id)) {
        viewingDoneStep = false;
        renderCurrentStep();
        return;
      }

      autoRunning = true;
      try {
        const checkRes = await api('/api/step/' + step.id + '/check', {
          method: 'POST',
          body: JSON.stringify(collectPayload(step.id)),
        });
        const checkData = await checkRes.json();
        if (checkData.ok) {
          showActionResult({ ...checkData, already_done: true }, false);
          await refreshState(true);
          setTimeout(runAutoFlow, 450);
          return;
        }

    function updateStepBusyPhaseFromLog(lines) {
      if (!isApplyBusy()) return;
      const lastLine = lines[lines.length - 1]?.trim();
      if (lastLine) lastBusyLogLine = lastLine;
      const text = lines.join('\n');
      if (currentStepId === 'deploy') {
        if (text.includes('Waiting for web') || text.includes('Health check attempt') || text.includes('manage.py check')) {
          stepBusyPhase = t('deployWaiting');
        } else if (text.includes(' up -d') || text.includes('Starting services')) {
          stepBusyPhase = t('deployStarting');
        } else if (text.includes(' pull') || text.includes('Pulling container') || text.includes('Downloading') || text.includes('Extracting') || text.includes('Pull complete')) {
          stepBusyPhase = t('deployPulling');
        }
      } else if (currentStepId === 'nginx') {
        if (text.includes('Verifying HTTPS')) {
          stepBusyPhase = t('nginxVerifying');
        } else if (text.includes('Testing certificate renewal') || text.includes('certbot renew')) {
          stepBusyPhase = t('nginxRenewTest');
        } else if (text.includes('Obtaining HTTPS certificate') || (text.includes(' certbot') && text.includes('--nginx'))) {
          stepBusyPhase = t('nginxCertbot');
        } else if (text.includes('Writing Nginx') || text.includes('nginx -t')) {
          stepBusyPhase = t('nginxConfiguring');
        } else if (text.includes('Installing Nginx') || text.includes('apt-get')) {
          stepBusyPhase = t('nginxInstalling');
        }
      }
      syncStepBusyOverlay();
    }

    function shouldRetryAwsVerify(data) {
      if (data?.data?.retryable === false) return false;
      if (data?.data?.retryable === true) return true;
      const checks = data?.data?.checks || [];
      const creds = checks.find(c => (c.label || '').includes('Credentials valid'));
      if (creds && !creds.ok) return true;
      const loc = checks.find(c => (c.label || '').includes('GetBucketLocation'));
      const list = checks.find(c => (c.label || '').includes('ListBucket'));
      if (creds?.ok && loc?.ok && list && !list.ok) return false;
      const put = checks.find(c => (c.label || '').includes('PutObject'));
      if (creds?.ok && list?.ok && put && !put.ok) return false;
      return true;
    }

    async function checkAwsAccessWithRetry(options = {}) {
      const maxAttempts = options.maxAttempts || 5;
      const initialDelayMs = options.initialDelayMs ?? 12000;
      const retryDelayMs = options.retryDelayMs || 8000;
      const progress = [];

      const render = () => renderAwsVerifyProgress(progress);

      const pushStep = (id, label, status) => {
        const step = { id, label, status };
        progress.push(step);
        render();
        return step;
      };

      const patchStep = (step, label, status) => {
        if (label !== undefined) step.label = label;
        if (status !== undefined) step.status = status;
        render();
      };

      const waitStep = pushStep(
        'wait',
        fmt(t('awsVerifyWaiting'), { s: Math.ceil(initialDelayMs / 1000) }),
        'active',
      );
      await countdown(initialDelayMs, sec => {
        patchStep(
          waitStep,
          sec > 0 ? fmt(t('awsVerifyWaiting'), { s: sec }) : t('awsVerifyWaitDone'),
          'active',
        );
      });
      patchStep(waitStep, t('awsVerifyWaitDone'), 'done');

      let lastData = { ok: false, message: '' };
      for (let attempt = 1; attempt <= maxAttempts; attempt++) {
        const tryStep = pushStep(
          'try-' + attempt,
          fmt(t('awsVerifyAttempt'), { n: attempt, max: maxAttempts }),
          'active',
        );

        lastData = await checkAwsAccessOnce();
        applyAwsBucketRegion(lastData);
        const isLastAttempt = attempt === maxAttempts;
        const canRetry = shouldRetryAwsVerify(lastData);
        renderAwsAccessResult(lastData, { showFailure: isLastAttempt || !canRetry });

        if (lastData.ok) {
          patchStep(
            tryStep,
            fmt(t('awsVerifyAttemptOk'), { n: attempt, max: maxAttempts }),
            'done',
          );
          pushStep('success', t('awsVerifySuccess'), 'done');
          return lastData;
        }

        patchStep(
          tryStep,
          fmt(t('awsVerifyAttemptFail'), { n: attempt, max: maxAttempts }),
          'fail',
        );

        if (!canRetry) {
          pushStep('stopped', t('awsVerifyStopped'), 'fail');
          return lastData;
        }

        if (attempt < maxAttempts) {
          const pauseStep = pushStep(
            'pause-' + attempt,
            fmt(t('awsVerifyRetryWait'), { s: Math.ceil(retryDelayMs / 1000) }),
            'active',
          );
          await countdown(retryDelayMs, sec => {
            patchStep(
              pauseStep,
              sec > 0 ? fmt(t('awsVerifyRetryWait'), { s: sec }) : t('awsVerifyRetryDone'),
              'active',
            );
          });
          patchStep(pauseStep, t('awsVerifyRetryDone'), 'done');
        }
      }

      pushStep('final-fail', fmt(t('awsVerifyAllFailed'), { max: maxAttempts }), 'fail');
      return lastData;
    }

    async function checkAwsAccess() {
      if (awsOperation) return;
      busy = true;
      setAwsFormBusy('verify');
      try {
        const data = await checkAwsAccessOnce();
        applyAwsBucketRegion(data);
        renderAwsAccessResult(data, { showFailure: true });
        renderAwsVerifyProgress([]);
        if (data.ok && state?.install_mode === 'auto' && !autoPaused) {
          setAwsFormBusy(null);
          await finalizeAwsStepAfterVerify(data);
          return;
        }
      } catch (e) {
        alert(t('error') + ': ' + e.message);
      } finally {
        setAwsFormBusy(null);
        busy = false;
        renderCurrentStep();
      }
    }

    async function finalizeAwsStepAfterVerify(verifyData) {
      if (!verifyData?.ok || currentStepId !== 'aws') return;
      busy = true;
      busyAction = 'apply';
      syncAwsFormButtons();
      try {
        const res = await api('/api/step/aws/apply', {
          method: 'POST',
          body: JSON.stringify(collectPayload('aws')),
        });
        const data = await res.json();
        showActionResult(
          data.ok
            ? { ok: true, message: t('awsSavedVerified'), data: { checks: verifyData.data?.checks || data.data?.checks } }
            : data,
          false,
        );
        await refreshState(true);
        if (data.ok) advanceToNextStep('apply', { ok: true, message: data.message });
      } catch (e) {
        alert(t('error') + ': ' + e.message);
      } finally {
        busy = false;
        busyAction = null;
        awsOperation = null;
        syncAwsFormButtons();
        renderCurrentStep();
      }
    }

    function api(path, options = {}) {
      const url = new URL(path, location.origin);
      if (TOKEN) url.searchParams.set('token', TOKEN);
      const headers = { ...(options.headers || {}) };
      if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
      return fetch(url, { ...options, headers });
    }

    async function refreshState(force = false) {
      if (!force && isAwsStepBusy()) return;
      const res = await api('/api/state');
      if (!res.ok) throw new Error(t('error'));
      const data = await res.json();
      if (data.busy) {
        // Долгий шаг держит сервер — state недоступен, не затираем текущий
        return data;
      }
      state = data;
      autoPaused = !!state.auto_paused;
      document.getElementById('install-dir').textContent = t('directory') + ': ' + state.install_dir;
      if (!currentStepId) currentStepId = state.current_step;
      updateModeBadge();
      renderStepList();
      renderCurrentStep();
      return state;
    }

    async function pollLog() {
      try {
        const res = await api('/api/log?offset=' + logOffset);
        const data = await res.json();
        if (data.lines && data.lines.length) {
          const filtered = data.lines.filter(l => !l.startsWith('[http]'));
          if (filtered.length) {
            const logEl = document.getElementById('log');
            logEl.textContent += filtered.join('\n') + '\n';
            logEl.scrollTop = logEl.scrollHeight;
            updateStepBusyPhaseFromLog(filtered);
          }
          logOffset = data.total;
        }
      } catch (_) {}
    }

    function renderStepList() {
      const el = document.getElementById('step-list');
      el.innerHTML = '';
      state.steps.forEach((step, idx) => {
        const meta = stepMeta(step.id);
        const div = document.createElement('div');
        div.className = 'step-item' + (step.id === currentStepId ? ' active' : '') + (step.status === 'done' ? ' done' : '') + (step.status === 'error' ? ' error' : '');
        div.onclick = () => {
          currentStepId = step.id;
          lastFormStepId = null;
          lastActionResult = null;
          viewingDoneStep = step.status === 'done' && step.id !== 'finish';
          renderStepList();
          renderCurrentStep();
          if (state?.install_mode === 'auto' && !autoPaused && step.status !== 'done') runAutoFlow();
        };
        div.innerHTML = '<div class="step-dot">' + (step.status === 'done' ? '✓' : (idx + 1)) + '</div>' +
          '<div><div class="step-title">' + esc(meta.title) + '</div><div class="step-desc">' + esc(meta.desc) + '</div></div>';
        el.appendChild(div);
      });
    }

    function renderCurrentStep() {
      const step = state.steps.find(s => s.id === currentStepId);
      if (!step) return;
      const meta = stepMeta(step.id);
      renderMascotTip(step.id);
      const doneBadge = document.getElementById('done-badge');
      if (viewingDoneStep && step.status === 'done' && step.id !== 'finish') {
        doneBadge.classList.remove('hidden');
        doneBadge.textContent = t('doneBadge');
      } else {
        doneBadge.classList.add('hidden');
      }
      document.getElementById('step-title').textContent = meta.title;
      document.getElementById('step-desc').textContent = meta.desc;
      document.getElementById('step-panel').classList.toggle('finish-step', step.id === 'finish');
      const statusEl = document.getElementById('step-status');
      statusEl.classList.remove('hidden', 'ok', 'fail', 'info');
      const recentFail = lastActionResult
        && lastActionResult.stepId === step.id
        && !lastActionResult.data.ok
        && Date.now() - lastActionResult.time < 120000;
      if (step.status === 'done') {
        if (step.id === 'finish') {
          statusEl.classList.add('hidden');
        } else {
          statusEl.textContent = step.message || t('hint');
          statusEl.classList.add('ok');
        }
      } else if (step.status === 'error') {
        statusEl.textContent = step.message || t('error');
        statusEl.classList.add('fail');
      } else if (recentFail) {
        statusEl.textContent = lastActionResult.data.message || t('error');
        statusEl.classList.add('fail');
      } else if (isApplyBusy()) {
        statusEl.innerHTML = '<span class="spinner"></span>' + esc(stepBusyPhase || defaultStepBusyLabel()) + '<span class="busy-dots" aria-hidden="true"></span>';
        statusEl.classList.add('info');
      } else {

      }
      const manualEl = document.getElementById('step-manual');
      if (step.manual && (step.status === 'done' || recentFail)) {
        manualEl.classList.remove('hidden');
        manualEl.textContent = (step.cwd ? '# cwd: ' + step.cwd + '\n\n' : '') + step.manual;

      if (lastFormStepId !== step.id) {
        renderForm(step);
        lastFormStepId = step.id;
      }
      if (viewingDoneStep && step.status === 'done' && step.id !== 'finish') {

    function suggestBucketFromDomain(domain) {
      const slug = (domain || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40);
      return slug ? `rmbl-${slug}` : '';
    }

    function s3Vendor() {
      return document.querySelector('input[name="s3_vendor"]:checked')?.value || 'aws';
    }

    function defaultS3Vendor(a) {
      if (a?.s3_vendor === 'other' || a?.s3_vendor === 'aws') return a.s3_vendor;
      return 'aws';
    }

    function awsSetupMode() {
      return document.querySelector('input[name="aws_setup_mode"]:checked')?.value || 'auto';
    }

    function awsAppCredentialsReady() {
      const g = id => document.getElementById(id);
      if (s3Vendor() === 'other') {
        const key = (g('s3_other_access_key')?.value || state?.aws_defaults?.aws_access_key_id || '').trim();
        const secret = (g('s3_other_secret')?.value || state?.aws_defaults?.aws_secret_access_key || '').trim();
        return !!(key && secret);
      }
      const key = (g('aws_access_key_id')?.value || state?.aws_defaults?.aws_access_key_id || '').trim();
      const secret = (g('aws_secret_access_key')?.value || state?.aws_defaults?.aws_secret_access_key || '').trim();
      return !!(key && secret);
    }

    function awsAutoRunStepBlocked() {
      return currentStepId === 'aws'
        && s3Vendor() === 'aws'
        && awsSetupMode() === 'auto'
        && !awsAppCredentialsReady();
    }

    function defaultAwsSetupMode(a) {
      if (defaultS3Vendor(a) === 'other') return 'manual';
      if (a?.aws_access_key_id && !a?.aws_bootstrap_access_key_id) return 'manual';
      if (a?.aws_bootstrap_access_key_id) return 'auto';
      return 'auto';
    }

    function wireAwsVendorMode(formEl) {
      formEl.querySelectorAll('input[name="s3_vendor"]').forEach(r => {
        r.onchange = () => {
          const other = s3Vendor() === 'other';
          formEl.querySelector('#aws-vendor-aws-wrap').classList.toggle('hidden', other);
          formEl.querySelector('#aws-vendor-other-wrap').classList.toggle('hidden', !other);
          if (other && state?.aws_defaults?.s3_vendor !== 'other') {
            ['s3_other_endpoint', 's3_other_region', 's3_other_access_key', 's3_other_secret'].forEach(id => {
              const el = document.getElementById(id);
              if (el) el.value = '';
            });
            const bucket = document.getElementById('s3_other_bucket');
            if (bucket) {
              bucket.value = suggestBucketFromDomain(state?.domain || state?.defaults?.domain || '');
            }
          }
          if (currentStepId === 'aws') {
            const step = state?.steps?.find(s => s.id === 'aws');
            if (step) renderActions(step);
          }
        };
      });
    }

    function wireAwsSetupMode(formEl) {
      formEl.querySelectorAll('input[name="aws_setup_mode"]').forEach(r => {
        r.onchange = () => {
          const manual = awsSetupMode() === 'manual';
          formEl.querySelector('#aws-mode-desc').textContent = manual ? t('awsManualDesc') : t('awsAutoDesc');
          formEl.querySelector('#aws-guide-auto').classList.toggle('hidden', manual);
          formEl.querySelector('#aws-guide-manual').classList.toggle('hidden', !manual);
          formEl.querySelector('#aws-flow-auto-fields').classList.toggle('hidden', manual);
          formEl.querySelector('#aws-flow-auto-actions').classList.toggle('hidden', manual);
          formEl.querySelector('#aws-flow-manual-fields').classList.toggle('hidden', !manual);
          if (currentStepId === 'aws') {
            const step = state?.steps?.find(s => s.id === 'aws');
            if (step) renderActions(step);
          }
        };
      });
    }

    function openAwsGuide(tab) {
      const bucket = document.getElementById('aws_storage_bucket_name')?.value || '';
      const u = new URL('/aws-guide.html', location.origin);
      if (TOKEN) u.searchParams.set('token', TOKEN);
      if (bucket) u.searchParams.set('bucket', bucket);
      u.searchParams.set('lang', lang);
      u.searchParams.set('tab', tab || awsSetupMode());
      window.open(u.toString(), '_blank');
    }

    async function provisionAws() {
      const g = id => document.getElementById(id);
      const payload = {
        aws_bootstrap_access_key_id: g('aws_bootstrap_access_key_id')?.value || '',
        aws_bootstrap_secret_access_key: g('aws_bootstrap_secret_access_key')?.value || '',
        aws_s3_region_name: g('aws_s3_region_name')?.value || 'eu-north-1',
        aws_storage_bucket_name: g('aws_storage_bucket_name')?.value || '',
      };
      if (!payload.aws_bootstrap_access_key_id || !payload.aws_bootstrap_secret_access_key) {
        alert(t('error') + ': bootstrap AWS credentials required');
        return;
      }
      if (!payload.aws_storage_bucket_name) {
        alert(t('error') + ': bucket name required');
        return;
      }
      if (awsOperation) return;
      busy = true;
      awsOperation = 'provision';
      syncAwsFormButtons();
      renderCurrentStep();
      renderAwsVerifyProgress([]);
      try {
        const res = await api('/api/aws/provision', { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.ok) {
          g('aws_access_key_id').value = data.aws_access_key_id || '';
          g('aws_secret_access_key').value = data.aws_secret_access_key || '';
          g('aws_storage_bucket_name').value = data.aws_storage_bucket_name || payload.aws_storage_bucket_name;
          if (data.aws_s3_region_name) g('aws_s3_region_name').value = data.aws_s3_region_name;
          showActionResult(data, false);
          setAwsFormBusy('verify');
          const verifyData = await checkAwsAccessWithRetry({
            initialDelayMs: 15000,
            maxAttempts: 6,
            retryDelayMs: 8000,
          });
          if (verifyData.ok) {
            setAwsFormBusy(null);
            if (state?.install_mode === 'auto' && !autoPaused) {
              await finalizeAwsStepAfterVerify(verifyData);
            } else {
              showActionResult({
                ok: true,
                message: t('awsSavedVerified'),
                data: { checks: verifyData.data?.checks },
              }, false);
              await refreshState(true);
            }
          } else {
            showActionResult(verifyData, false);
          }
        } else {
          showActionResult(data, false);
        }
      } catch (e) {
        alert(t('error') + ': ' + e.message);
      } finally {
        setAwsFormBusy(null);
        busy = false;
        renderCurrentStep();
      }
    }

    function renderEnvStatuses(statuses) {
      const el = document.getElementById('env-status-list');
      if (!el || !statuses || !statuses.length) return;
      el.innerHTML = statuses.map(s =>
        `<div class="status-item ${s.ok ? 'ok' : 'fail'}">${s.ok ? '✓' : '✗'} ${esc(s.label)}</div>`
      ).join('');
    }

    function envMode() {
      return document.querySelector('input[name="env_mode"]:checked')?.value
        || state?.defaults?.env_mode
        || 'simple';
    }

    function collectPayload(stepId) {
      const g = id => document.getElementById(id);
      if (stepId === 'ghcr') {
        return {
          ghcr_key: g('ghcr_key')?.value || '',
          ghcr_user: g('ghcr_user')?.value || state?.defaults?.ghcr_user || 'rmbldeploy',
        };
      }
      if (stepId === 'env') {
        const presetDomain = (state?.domain || state?.defaults?.domain || '').trim();
        const mode = envMode();
        const base = {
          env_mode: mode,
          domain: (g('domain')?.value || presetDomain).trim(),
          allowed_hosts: (g('allowed_hosts')?.value || presetDomain || state?.defaults?.allowed_hosts || '').trim(),
        };
        if (mode === 'advanced') {
          return {
            ...base,
            db_pass: g('db_pass')?.value || '',
            redis_password: g('redis_password')?.value || '',
            secret_key: g('secret_key')?.value || '',
            use_external_db: g('use_external_db')?.checked || false,
            use_external_redis: g('use_external_redis')?.checked || false,
            db_host: g('db_host')?.value || '',
            db_port: g('db_port')?.value || '',
            db_name: g('db_name')?.value || '',
            db_user: g('db_user')?.value || '',
            redis_host: g('redis_host')?.value || '',
            redis_port: g('redis_port')?.value || '',
          };
        }
        return base;
      }
      if (stepId === 'aws') {
        const vendor = s3Vendor();
        if (vendor === 'other') {
          return {
            s3_vendor: 'other',
            aws_s3_endpoint_url: g('s3_other_endpoint')?.value || '',
            aws_s3_region_name: g('s3_other_region')?.value || '',
            aws_storage_bucket_name: g('s3_other_bucket')?.value || '',
            aws_access_key_id: g('s3_other_access_key')?.value || '',
            aws_secret_access_key: g('s3_other_secret')?.value || '',
            s3_addressing_style: g('s3_addressing_style')?.value || 'auto',
            s3_signature_version: g('s3_signature_version')?.value || 's3v4',
          };
        }
        return {
          s3_vendor: 'aws',
          aws_bootstrap_access_key_id: g('aws_bootstrap_access_key_id')?.value || '',
          aws_bootstrap_secret_access_key: g('aws_bootstrap_secret_access_key')?.value || '',
          aws_access_key_id: g('aws_access_key_id')?.value || '',
          aws_secret_access_key: g('aws_secret_access_key')?.value || '',
          aws_storage_bucket_name: g('aws_storage_bucket_name')?.value || '',
          aws_s3_region_name: g('aws_s3_region_name')?.value || 'eu-north-1',
        };
      }
      if (stepId === 'superuser') return {
        admin_username: g('admin_username')?.value || '',
        admin_email: g('admin_email')?.value || '',
        admin_password: g('admin_password')?.value || '',
        admin_password_confirm: g('admin_password_confirm')?.value || '',
      };
      if (stepId === 'nginx') return { certbot_email: g('certbot_email')?.value || '', domain: g('nginx_domain')?.value || '' };
      return {};
    }

    function renderActions(step) {
      const actions = document.getElementById('step-actions');
      actions.innerHTML = '';
      const isDoneView = viewingDoneStep && step.status === 'done' && step.id !== 'finish';
      if (step.id === 'finish') {
        actions.appendChild(mkBtn(t('finishRefresh'), 'secondary', refreshFinishStatus, 'finish-refresh-btn'));
        actions.appendChild(mkBtn(t('finish'), 'primary', finishInstaller));
        return;
      }
      if (isDoneView) {
        actions.appendChild(mkBtn(t('recheck'), 'secondary', () => runAction('check')));
        const idx = state.steps.findIndex(s => s.id === step.id);
        if (idx < state.steps.length - 1) {
          actions.appendChild(mkBtn(t('next'), 'secondary', () => {
            currentStepId = state.steps[idx + 1].id;
            lastFormStepId = null;
            viewingDoneStep = false;
            renderStepList();
            renderCurrentStep();
          }));
        }
        return;
      }
      if (step.status !== 'done') {
        const runBlocked = step.id === 'aws' && awsAutoRunStepBlocked();
        actions.appendChild(mkBtn(t('runAuto'), 'primary', () => runAction('apply'), null, runBlocked));
        actions.appendChild(mkBtn(t('verify'), 'secondary', () => runAction('check')));
        if (SKIP_ALLOWED_STEPS.has(step.id)) {
          actions.appendChild(mkBtn(t('skip'), 'secondary', () => runAction('skip')));
        }
      }
      if (step.status === 'done') {
        actions.appendChild(mkBtn(t('recheck'), 'secondary', () => runAction('check')));
        actions.appendChild(mkBtn(t('next'), 'secondary', () => {
          const idx = state.steps.findIndex(s => s.id === step.id);
          if (idx < state.steps.length - 1) {
            currentStepId = state.steps[idx + 1].id;
            lastFormStepId = null;
            viewingDoneStep = false;
            renderStepList();
            renderCurrentStep();
          }
        }));
      }
    }

    function mkBtn(text, cls, handler, id, forceDisabled = false) {
      const b = document.createElement('button');
      const locked = isAwsStepBusy();
      if (locked && cls.includes('primary') && isApplyBusy()) {
        b.innerHTML = '<span class="spinner"></span>' + esc(text);
      } else {
        b.textContent = text;
      }
      if (id) b.id = id;
      b.className = 'btn ' + cls;
      b.disabled = locked || forceDisabled;
      b.onclick = handler;
      return b;
    }

    function advanceToNextStep(action, data) {
      if (!data.ok || currentStepId === 'finish') return;
      const idx = state.steps.findIndex(s => s.id === currentStepId);
      if (idx < 0 || idx >= state.steps.length - 1) return;
      const step = state.steps[idx];
      if (action === 'skip' || step.status === 'done' || action === 'apply' || action === 'check') {
        currentStepId = state.steps[idx + 1].id;
        lastFormStepId = null;
        viewingDoneStep = false;
        renderStepList();
        renderCurrentStep();
        if (state?.install_mode === 'auto' && !autoPaused) setTimeout(runAutoFlow, 400);
      }
    }

    async function runAction(action, dnsOnly = false, silent = false) {
      if (isAwsStepBusy()) return;
      if (currentStepId === 'superuser' && action === 'apply') {
        const pwd = document.getElementById('admin_password')?.value || '';
        const confirm = document.getElementById('admin_password_confirm')?.value || '';
        if (!pwd || !confirm) {
          alert(t('adminPasswordRequired'));
          return;
        }
        if (pwd !== confirm) {
          alert(t('adminPasswordMismatch'));
          return;
        }
      }
      busy = true;
      busyAction = action;
      if (currentStepId === 'aws') {
        awsOperation = (action === 'apply' || action === 'check') ? 'verify' : 'working';
      }
      syncAwsFormButtons();
      if (action === 'apply' && currentStepId !== 'aws') {
        stepBusyPhase = initialApplyBusyLabel();
        lastBusyLogLine = '';
        startFastLogPoll();
        syncStepBusyOverlay();
      }
      renderCurrentStep();
      try {
        if (dnsOnly && (currentStepId === 'nginx' || currentStepId === 'env')) {
          const domain = currentStepId === 'env'
            ? (document.getElementById('domain')?.value?.trim() || '')
            : (state.domain || document.getElementById('nginx_domain')?.value?.trim() || '');
          const data = await (await api('/api/step/' + currentStepId + '/dns-check?domain=' + encodeURIComponent(domain))).json();
          if (currentStepId === 'env') renderEnvDnsStatus(data);
          showActionResult(data, silent);
          return;
        }
        const res = await api('/api/step/' + currentStepId + '/' + action, { method: 'POST', body: JSON.stringify(collectPayload(currentStepId)) });
        let data = await res.json();
        if (currentStepId === 'aws' && action === 'apply' && !data.ok) {
          const p = collectPayload('aws');
          if (p.aws_access_key_id && p.aws_secret_access_key && p.aws_storage_bucket_name) {
            if (data.data?.checks) renderAwsChecks(data.data.checks);
            setAwsFormBusy('verify');
            try {
              const verifyData = await checkAwsAccessWithRetry({
                initialDelayMs: 8000,
                maxAttempts: 5,
                retryDelayMs: 8000,
              });
              if (verifyData.ok) {
                data = {
                  ok: true,
                  message: t('awsSavedVerified'),
                  data: { ...data.data, checks: verifyData.data?.checks },
                };
              } else {
                data = verifyData;
              }
            } finally {
              setAwsFormBusy(null);
            }
          }
        }
        showActionResult(data, silent);
        await refreshState(true);
        advanceToNextStep(action, data);
      } catch (e) { if (!silent) alert(t('error') + ': ' + e.message); }
      finally {
        busy = false;
        busyAction = null;
        awsOperation = null;
        stepBusyPhase = '';
        lastBusyLogLine = '';
        stopFastLogPoll();
        syncAwsFormButtons();
        syncStepBusyOverlay();
        renderCurrentStep();
      }
    }

    function showActionResult(data, silent) {
      if (!silent) {
        lastActionResult = { stepId: currentStepId, data, time: Date.now() };
        if (data.ok) lastActionResult = null;
        const statusEl = document.getElementById('step-status');
        statusEl.classList.remove('hidden', 'ok', 'fail', 'info');
        let msg = data.message || (data.ok ? 'OK' : t('error'));
        if (data.already_done) msg = t('alreadyDone');
        statusEl.textContent = msg;
        statusEl.classList.add(data.ok ? 'ok' : 'fail');
      }
      if (data.data?.statuses) {
        if (currentStepId === 'aws') renderAwsStatuses(data.data.statuses);
        else renderEnvStatuses(data.data.statuses);
      }
      if (data.data?.checks) renderAwsChecks(data.data.checks);
      const manualEl = document.getElementById('step-manual');
      if (data.manual) {
        manualEl.classList.remove('hidden');
        manualEl.textContent = (data.cwd ? '# cwd: ' + data.cwd + '\n\n' : '') + data.manual;
        if (!silent && !data.ok) manualEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    async function finishInstaller() {
      if (!confirm(t('finishConfirm'))) return;
      await api('/api/finish', { method: 'POST', body: '{}' });
      document.getElementById('shutdown-title').textContent = t('shutdownTitle');
      document.getElementById('shutdown-desc').textContent = t('shutdownDesc');
      showScreen('shutdown');
    }

    async function init() {
      setLang(lang);
      showScreen('loading');
      setLoadingScreen(t('loadingConnect'), '');
      if (!TOKEN) {
        document.getElementById('screen-loading').innerHTML = '<div style="padding:40px;color:#f08080;text-align:center">' + esc(t('noToken')) + '</div>';
        return;
      }
      // Ретраим, пока не получим state: сервер может быть занят долгим шагом
      // (STATE_LOCK) или временно недоступен.
      for (let attempt = 0; ; attempt++) {
        try {
          const data = await refreshState(true);
          if (data && data.busy) {
            setLoadingScreen(t('loadingBusy'), t('loadingBusyDesc'));
            await sleep(3000);
            continue;
          }
          break;
        } catch (e) {
          setLoadingScreen(t('loadingRetry'), e.message || '');
          await sleep(Math.min(2000 + attempt * 1000, 8000));
        }
      }
      if (state.install_started) {
        showScreen('wizard');
        updateModeBadge();
        renderStepList();
        renderCurrentStep();
        if (state.install_mode === 'auto' && !autoPaused) setTimeout(runAutoFlow, 600);
      } else if (state.preflight_done) {
        renderStartScreen();
        showScreen('start');
      } else {
        renderWelcomeScreen();
        showScreen('welcome');
      }
      setInterval(pollLog, 1500);
    }
    init();
  </script>
</body>
</html>
