<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rumble Server — Installer</title>
  <style>
    :root {
      --bg: #0f1419; --surface: #1a2332; --surface2: #243044; --border: #2d3a4f;
      --text: #e7ecf3; --muted: #8b9cb3; --accent: #3b82f6; --accent-hover: #2563eb;
      --ok: #22c55e; --err: #ef4444; --radius: 10px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { padding: 20px 24px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
    header h1 { margin: 0 0 4px; font-size: 1.35rem; }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .lang-switch { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
    .lang-switch button { border: none; background: transparent; color: var(--muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .lang-switch button.active { background: var(--accent); color: #fff; }
    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 76px); }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .sidebar { border-right: none; border-bottom: 1px solid var(--border); } }
    .sidebar { padding: 16px; border-right: 1px solid var(--border); background: var(--surface); }
    .step-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius); margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; }
    .step-item:hover { background: var(--surface2); }
    .step-item.active { background: var(--surface2); border-color: var(--accent); }
    .step-dot { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; background: var(--border); color: var(--muted); }
    .step-item.done .step-dot { background: var(--ok); color: #052e16; }
    .step-item.error .step-dot { background: var(--err); color: #fff; }
    .step-item.active .step-dot { background: var(--accent); color: #fff; }
    .step-title { font-size: 0.92rem; font-weight: 600; }
    .step-desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    main { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .panel h2 { margin: 0 0 8px; font-size: 1.15rem; }
    .panel p.desc { margin: 0 0 16px; color: var(--muted); font-size: 0.9rem; }
    .status { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.45; }
    .status.ok { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.35); }
    .status.fail { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.35); }
    .status.info { background: rgba(59,130,246,.12); border: 1px solid rgba(59,130,246,.35); }
    .manual { background: #111827; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.82rem; white-space: pre-wrap; margin-bottom: 16px; color: #cbd5e1; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    button.btn { border: none; border-radius: 8px; padding: 10px 16px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    button.primary { background: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-hover); }
    button.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover { background: var(--border); }
    button.btn:disabled { opacity: .55; cursor: not-allowed; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 16px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; color: var(--muted); }
    input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 0.9rem; }
    input:focus { outline: 2px solid rgba(59,130,246,.45); border-color: var(--accent); }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 8px 0 12px; color: var(--text); font-size: 0.9rem; }
    .checkbox-row input { width: auto; }
    .log { flex: 1; background: #0b0f14; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.78rem; overflow: auto; white-space: pre-wrap; color: #94a3b8; max-height: 320px; }
    .hidden { display: none !important; }
    .mode-switch { display: flex; gap: 8px; margin-bottom: 0; flex-wrap: wrap; }
    .mode-switch label { flex-direction: row; align-items: center; gap: 8px; cursor: pointer; color: var(--text); font-size: 0.9rem; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
    .mode-switch label:has(input:checked) { border-color: var(--accent); background: rgba(59,130,246,.1); }
    .mode-switch input { width: auto; }
    .env-form { display: flex; flex-direction: column; gap: 14px; }
    .env-section { background: rgba(36, 48, 68, 0.35); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
    .env-section-title { margin: 0 0 6px; font-size: 0.98rem; font-weight: 600; color: var(--text); }
    .env-section-lead { margin: 0 0 14px; color: var(--muted); font-size: 0.85rem; line-height: 1.5; }
    .env-inner { margin-top: 12px; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
    .env-inner-title { margin: 0 0 8px; font-size: 0.88rem; font-weight: 600; color: var(--text); }
    select { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 0.9rem; }
    select:focus { outline: 2px solid rgba(59,130,246,.45); border-color: var(--accent); }
    .status-list { margin: 12px 0 16px; }
    .status-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 0.9rem; }
    .status-item.ok { color: var(--ok); }
    .status-item.fail { color: var(--err); }
    .aws-block { border: none; border-radius: 0; padding: 0; margin-top: 0; }
    .aws-block h4 { display: none; }
    .dns-block { border: none; border-radius: 0; padding: 0; margin-top: 0; }
    .dns-block h4 { display: none; }
    .dns-block p { margin: 0 0 10px; color: var(--muted); font-size: 0.85rem; line-height: 1.45; }
    .dns-table { width: 100%; font-size: 0.85rem; border-collapse: collapse; margin-bottom: 10px; }
    .dns-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .dns-table td:first-child { color: var(--muted); width: 72px; white-space: nowrap; }
    .dns-table code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.82rem; }
    #env-dns-status.ok, #aws-access-status.ok { color: var(--ok); }
    #env-dns-status.fail, #aws-access-status.fail { color: var(--err); }
    #aws-access-status, #env-dns-status { font-size: 0.85rem; margin-top: 4px; }
    .link-row { margin: 10px 0; }
    .link-row a { color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: -2px;
      margin-right: 6px;
    }
    .aws-verify-progress {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(59,130,246,.08);
      border: 1px solid rgba(59,130,246,.25);
      border-radius: 8px;
    }
    .verify-step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.35;
    }
    .verify-step.active { color: var(--accent); }
    .verify-step.done { color: var(--ok); }
    .verify-step.fail { color: var(--err); }
    .verify-step .mark { width: 16px; flex-shrink: 0; text-align: center; }
    .env-form.aws-form-root { position: relative; }
    .aws-busy-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 48px;
      background: rgba(15, 20, 25, 0.55);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 600;
      cursor: wait;
    }
    .panel.aws-step-locked .actions button { pointer-events: none; opacity: 0.55; }
  </style>
</head>
<body>

    const STEPS_I18N = {

    let lang = localStorage.getItem('installer_lang') || 'en';
    const params = new URLSearchParams(location.search);
    const TOKEN = params.get('token') || '';
    let state = null, currentStepId = null, logOffset = 0, busy = false, lastFormStepId = null, lastActionResult = null;

    function t(k) { return (UI[lang] && UI[lang][k]) || UI.en[k] || k; }
    function stepMeta(id) { return (STEPS_I18N[lang] && STEPS_I18N[lang][id]) || STEPS_I18N.en[id] || { title: id, desc: '', pending: '' }; }
    function pendingMessage(step) {
      const meta = stepMeta(step.id);
      return meta.pending || t('hint');
    }
    function dnsHintFor(domain) {
      const d = (domain || '').trim();
      const parts = d.split('.').filter(Boolean);
      let name = '@';
      let isSubdomain = false;
      if (parts.length >= 3) {
        name = parts[0];
        isSubdomain = true;

      let left = Math.ceil(ms / 1000);
      onTick(left);
      while (left > 0) {
        await sleep(1000);
        left -= 1;
        onTick(Math.max(left, 0));
      }

    function shouldRetryAwsVerify(data) {
      if (data?.data?.retryable === false) return false;
      if (data?.data?.retryable === true) return true;
      const checks = data?.data?.checks || [];
      const creds = checks.find(c => (c.label || '').includes('Credentials valid'));
      if (creds && !creds.ok) return true;
      const loc = checks.find(c => (c.label || '').includes('GetBucketLocation'));
      const list = checks.find(c => (c.label || '').includes('ListBucket'));
      if (creds?.ok && loc?.ok && list && !list.ok) return false;
      const put = checks.find(c => (c.label || '').includes('PutObject'));
      if (creds?.ok && list?.ok && put && !put.ok) return false;
      return true;
    }

    async function checkAwsAccessWithRetry(options = {}) {
      const maxAttempts = options.maxAttempts || 5;
      const initialDelayMs = options.initialDelayMs ?? 12000;
      const retryDelayMs = options.retryDelayMs || 8000;
      const progress = [];

      const render = () => renderAwsVerifyProgress(progress);

      const pushStep = (id, label, status) => {
        const step = { id, label, status };
        progress.push(step);
        render();
        return step;
      };

      const patchStep = (step, label, status) => {
        if (label !== undefined) step.label = label;
        if (status !== undefined) step.status = status;
        render();
      };

      const waitStep = pushStep(
        'wait',
        fmt(t('awsVerifyWaiting'), { s: Math.ceil(initialDelayMs / 1000) }),
        'active',
      );
      await countdown(initialDelayMs, sec => {
        patchStep(
          waitStep,
          sec > 0 ? fmt(t('awsVerifyWaiting'), { s: sec }) : t('awsVerifyWaitDone'),
          'active',
        );
      });
      patchStep(waitStep, t('awsVerifyWaitDone'), 'done');

      let lastData = { ok: false, message: '' };
      for (let attempt = 1; attempt <= maxAttempts; attempt++) {
        const tryStep = pushStep(
          'try-' + attempt,
          fmt(t('awsVerifyAttempt'), { n: attempt, max: maxAttempts }),
          'active',
        );

        lastData = await checkAwsAccessOnce();
        applyAwsBucketRegion(lastData);
        const isLastAttempt = attempt === maxAttempts;
        const canRetry = shouldRetryAwsVerify(lastData);
        renderAwsAccessResult(lastData, { showFailure: isLastAttempt || !canRetry });

        if (lastData.ok) {
          patchStep(
            tryStep,
            fmt(t('awsVerifyAttemptOk'), { n: attempt, max: maxAttempts }),
            'done',
          );
          pushStep('success', t('awsVerifySuccess'), 'done');
          return lastData;
        }

        patchStep(
          tryStep,
          fmt(t('awsVerifyAttemptFail'), { n: attempt, max: maxAttempts }),
          'fail',
        );

        if (!canRetry) {
          pushStep('stopped', t('awsVerifyStopped'), 'fail');
          return lastData;
        }

        if (attempt < maxAttempts) {
          const pauseStep = pushStep(
            'pause-' + attempt,
            fmt(t('awsVerifyRetryWait'), { s: Math.ceil(retryDelayMs / 1000) }),
            'active',
          );
          await countdown(retryDelayMs, sec => {
            patchStep(
              pauseStep,
              sec > 0 ? fmt(t('awsVerifyRetryWait'), { s: sec }) : t('awsVerifyRetryDone'),
              'active',
            );
          });
          patchStep(pauseStep, t('awsVerifyRetryDone'), 'done');
        }
      }

      pushStep('final-fail', fmt(t('awsVerifyAllFailed'), { max: maxAttempts }), 'fail');
      return lastData;
    }

      if (awsOperation) return;
      busy = true;

      try {

        renderAwsAccessResult(data, { showFailure: true });
        renderAwsVerifyProgress([]);

    function api(path, options = {}) {
      const url = new URL(path, location.origin);
      if (TOKEN) url.searchParams.set('token', TOKEN);
      const headers = { ...(options.headers || {}) };
      if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
      return fetch(url, { ...options, headers });
    }

    async function pollLog() {
      try {
        const res = await api('/api/log?offset=' + logOffset);
        const data = await res.json();
        if (data.lines && data.lines.length) {
          const filtered = data.lines.filter(l => !l.startsWith('[http]'));
          if (filtered.length) {
            const logEl = document.getElementById('log');
            logEl.textContent += filtered.join('\n') + '\n';
            logEl.scrollTop = logEl.scrollHeight;
          }
          logOffset = data.total;
        }

        div.className = 'step-item' + (step.id === currentStepId ? ' active' : '') + (step.status === 'done' ? ' done' : '') + (step.status === 'error' ? ' error' : '');

    function renderCurrentStep() {
      const step = state.steps.find(s => s.id === currentStepId);

      const meta = stepMeta(step.id);
      document.getElementById('step-title').textContent = meta.title;
      document.getElementById('step-desc').textContent = meta.desc;
      const statusEl = document.getElementById('step-status');
      statusEl.classList.remove('hidden', 'ok', 'fail', 'info');
      const recentFail = lastActionResult
        && lastActionResult.stepId === step.id
        && !lastActionResult.data.ok
        && Date.now() - lastActionResult.time < 120000;
      if (step.status === 'done') {
        statusEl.textContent = step.message || t('hint');
        statusEl.classList.add('ok');
      } else if (step.status === 'error') {
        statusEl.textContent = step.message || t('error');
        statusEl.classList.add('fail');
      } else if (recentFail) {
        statusEl.textContent = lastActionResult.data.message || t('error');
        statusEl.classList.add('fail');

        statusEl.textContent = pendingMessage(step);
        statusEl.classList.add('info');

      const manualEl = document.getElementById('step-manual');

        formEl.innerHTML = `<div class="form-grid">
          <label>Username<input type="text" id="admin_username" value="${esc(state.admin_username || 'admin')}"></label>
          <label>Email<input type="email" id="admin_email" placeholder="admin@example.com"></label>
          <label>Password<input type="password" id="admin_password" placeholder="${t('strongPassword')}"></label></div>`;
        return;
      }
      if (step.id === 'nginx') {
        formEl.classList.remove('hidden');
        formEl.innerHTML = `<div class="form-grid">
          <label>${t('domainLabel')}<input type="text" id="nginx_domain" value="${esc(state.domain || d.domain || '')}" readonly></label>
          <label>${t('certbotEmail')}<input type="email" id="certbot_email" placeholder="you@example.com"></label></div>
          <div class="actions" style="margin:0"><button class="btn secondary" type="button" id="dns-check-btn">${t('checkDns')}</button></div>`;
        formEl.querySelector('#dns-check-btn').onclick = () => runAction('check', true, true);
        return;
      }
      if (step.id === 'finish') {
        formEl.classList.remove('hidden');
        formEl.innerHTML = `<div class="manual">${esc(step.message || '')}</div>`;
      }
    }

    function envMode() {
      return document.querySelector('input[name="env_mode"]:checked')?.value || 'simple';
    }

    function openAwsGuide() {
      const bucket = document.getElementById('aws_storage_bucket_name')?.value || '';
      const u = new URL('/aws-guide.html', location.origin);
      if (TOKEN) u.searchParams.set('token', TOKEN);
      if (bucket) u.searchParams.set('bucket', bucket);
      window.open(u.toString(), '_blank');
    }

    async function provisionAws() {
      const g = id => document.getElementById(id);
      const payload = {
        aws_bootstrap_access_key_id: g('aws_bootstrap_access_key_id')?.value || '',
        aws_bootstrap_secret_access_key: g('aws_bootstrap_secret_access_key')?.value || '',
        aws_s3_region_name: g('aws_s3_region_name')?.value || 'eu-north-1',
        aws_storage_bucket_name: g('aws_storage_bucket_name')?.value || '',
      };
      if (!payload.aws_bootstrap_access_key_id || !payload.aws_bootstrap_secret_access_key) {
        alert(t('error') + ': bootstrap AWS credentials required');
        return;
      }
      if (!payload.aws_storage_bucket_name) {
        alert(t('error') + ': bucket name required');
        return;
      }
      if (awsOperation) return;
      busy = true;
      awsOperation = 'provision';
      syncAwsFormButtons();
      renderCurrentStep();
      renderAwsVerifyProgress([]);
      try {
        const res = await api('/api/aws/provision', { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.ok) {
          g('aws_access_key_id').value = data.aws_access_key_id || '';
          g('aws_secret_access_key').value = data.aws_secret_access_key || '';
          g('aws_storage_bucket_name').value = data.aws_storage_bucket_name || payload.aws_storage_bucket_name;
          if (data.aws_s3_region_name) g('aws_s3_region_name').value = data.aws_s3_region_name;
          showActionResult(data, false);
          setAwsFormBusy('verify');
          const verifyData = await checkAwsAccessWithRetry({
            initialDelayMs: 15000,
            maxAttempts: 6,
            retryDelayMs: 8000,
          });
          if (verifyData.ok) {
            showActionResult({
              ok: true,
              message: t('awsSavedVerified'),
              data: { checks: verifyData.data?.checks },
            }, false);
            await refreshState();
          } else {
            showActionResult(verifyData, false);
          }
        } else {
          showActionResult(data, false);
        }
      } catch (e) {
        alert(t('error') + ': ' + e.message);
      } finally {
        setAwsFormBusy(null);
        busy = false;
        renderCurrentStep();
      }
    }

    function renderEnvStatuses(statuses) {
      const el = document.getElementById('env-status-list');
      if (!el || !statuses || !statuses.length) return;
      el.innerHTML = statuses.map(s =>
        `<div class="status-item ${s.ok ? 'ok' : 'fail'}">${s.ok ? '✓' : '✗'} ${esc(s.label)}</div>`
      ).join('');
    }

    function collectPayload(stepId) {
      const g = id => document.getElementById(id);
      if (stepId === 'ghcr') return { ghcr_key: g('ghcr_key')?.value || '', ghcr_user: g('ghcr_user')?.value || 'rmbldeploy' };
      if (stepId === 'env') {
        const mode = envMode();
        const base = {
          env_mode: mode,
          domain: g('domain')?.value || '',
          allowed_hosts: g('allowed_hosts')?.value || '',
        };
        if (mode === 'advanced') {
          return {
            ...base,
            db_pass: g('db_pass')?.value || '',
            redis_password: g('redis_password')?.value || '',
            secret_key: g('secret_key')?.value || '',
            use_external_db: g('use_external_db')?.checked || false,
            use_external_redis: g('use_external_redis')?.checked || false,
            db_host: g('db_host')?.value || '',
            db_port: g('db_port')?.value || '',
            db_name: g('db_name')?.value || '',
            db_user: g('db_user')?.value || '',
            redis_host: g('redis_host')?.value || '',
            redis_port: g('redis_port')?.value || '',
          };
        }
        return base;
      }
      if (stepId === 'aws') {
        return {
          aws_bootstrap_access_key_id: g('aws_bootstrap_access_key_id')?.value || '',
          aws_bootstrap_secret_access_key: g('aws_bootstrap_secret_access_key')?.value || '',
          aws_access_key_id: g('aws_access_key_id')?.value || '',
          aws_secret_access_key: g('aws_secret_access_key')?.value || '',
          aws_storage_bucket_name: g('aws_storage_bucket_name')?.value || '',
          aws_s3_region_name: g('aws_s3_region_name')?.value || 'eu-north-1',
        };
      }
      if (stepId === 'superuser') return { admin_username: g('admin_username')?.value || '', admin_email: g('admin_email')?.value || '', admin_password: g('admin_password')?.value || '' };
      if (stepId === 'nginx') return { certbot_email: g('certbot_email')?.value || '', domain: g('nginx_domain')?.value || '' };
      return {};
    }

    function renderActions(step) {
      const actions = document.getElementById('step-actions');
      actions.innerHTML = '';
      if (step.id === 'finish') { actions.appendChild(mkBtn(t('finish'), 'primary', finishInstaller)); return; }
      actions.appendChild(mkBtn(t('runAuto'), 'primary', () => runAction('apply')));
      actions.appendChild(mkBtn(t('verify'), 'secondary', () => runAction('check')));
      actions.appendChild(mkBtn(t('skip'), 'secondary', () => runAction('skip')));
      if (step.status === 'done') {
        actions.appendChild(mkBtn(t('next'), 'secondary', () => {
          const idx = state.steps.findIndex(s => s.id === step.id);
          if (idx < state.steps.length - 1) { currentStepId = state.steps[idx + 1].id; lastFormStepId = null; renderStepList(); renderCurrentStep(); }
        }));
      }
    }

    function mkBtn(text, cls, handler) {
      const b = document.createElement('button');
      b.textContent = text; b.className = 'btn ' + cls; b.disabled = isAwsStepBusy(); b.onclick = handler;
      return b;
    }

    function advanceToNextStep(action, data) {
      if (!data.ok || currentStepId === 'finish') return;
      const idx = state.steps.findIndex(s => s.id === currentStepId);
      if (idx < 0 || idx >= state.steps.length - 1) return;
      const step = state.steps[idx];
      if (action === 'skip' || step.status === 'done') {
        currentStepId = state.steps[idx + 1].id;
        lastFormStepId = null;
        renderStepList();
        renderCurrentStep();
      }
    }

    async function runAction(action, dnsOnly = false, silent = false) {
      if (isAwsStepBusy()) return;
      busy = true;
      if (currentStepId === 'aws') {
        awsOperation = (action === 'apply' || action === 'check') ? 'verify' : 'working';
      }
      syncAwsFormButtons();
      renderCurrentStep();
      try {
        if (dnsOnly && (currentStepId === 'nginx' || currentStepId === 'env')) {
          const domain = currentStepId === 'env'
            ? (document.getElementById('domain')?.value?.trim() || '')
            : (state.domain || document.getElementById('nginx_domain')?.value?.trim() || '');
          const data = await (await api('/api/step/' + currentStepId + '/dns-check?domain=' + encodeURIComponent(domain))).json();
          if (currentStepId === 'env') renderEnvDnsStatus(data);
          showActionResult(data, silent);
          return;
        }
        const res = await api('/api/step/' + currentStepId + '/' + action, { method: 'POST', body: JSON.stringify(collectPayload(currentStepId)) });
        let data = await res.json();
        if (currentStepId === 'aws' && action === 'apply' && !data.ok) {
          const p = collectPayload('aws');
          if (p.aws_access_key_id && p.aws_secret_access_key && p.aws_storage_bucket_name) {
            if (data.data?.checks) renderAwsChecks(data.data.checks);
            setAwsFormBusy('verify');
            try {
              const verifyData = await checkAwsAccessWithRetry({
                initialDelayMs: 8000,
                maxAttempts: 5,
                retryDelayMs: 8000,
              });
              if (verifyData.ok) {
                data = {
                  ok: true,
                  message: t('awsSavedVerified'),
                  data: { ...data.data, checks: verifyData.data?.checks },
                };
              } else {
                data = verifyData;
              }
            } finally {
              setAwsFormBusy(null);
            }
          }
        }
        showActionResult(data, silent);
        await refreshState();
        advanceToNextStep(action, data);
      } catch (e) { if (!silent) alert(t('error') + ': ' + e.message); }
      finally {
        busy = false;
        awsOperation = null;
        syncAwsFormButtons();
        renderCurrentStep();
      }
    }

    function showActionResult(data, silent) {
      if (!silent) {
        lastActionResult = { stepId: currentStepId, data, time: Date.now() };
        if (data.ok) lastActionResult = null;
        const statusEl = document.getElementById('step-status');
        statusEl.classList.remove('hidden', 'ok', 'fail', 'info');
        statusEl.textContent = data.message || (data.ok ? 'OK' : t('error'));
        statusEl.classList.add(data.ok ? 'ok' : 'fail');
      }
      if (data.data?.statuses) {
        if (currentStepId === 'aws') renderAwsStatuses(data.data.statuses);
        else renderEnvStatuses(data.data.statuses);
      }
      if (data.data?.checks) renderAwsChecks(data.data.checks);
      const manualEl = document.getElementById('step-manual');
      if (data.manual) {
        manualEl.classList.remove('hidden');
        manualEl.textContent = (data.cwd ? '# cwd: ' + data.cwd + '\n\n' : '') + data.manual;
        if (!silent && !data.ok) manualEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    async function finishInstaller() {
      if (!confirm(t('finishConfirm'))) return;
      await api('/api/finish', { method: 'POST', body: '{}' });
      const statusEl = document.getElementById('step-status');
      statusEl.textContent = t('shuttingDown');
      statusEl.classList.remove('hidden');
    }

    async function init() {
      setLang(lang);
      if (!TOKEN) { document.body.innerHTML = '<div style="padding:40px;color:#ef4444">' + t('noToken') + '</div>'; return; }
      try {
        await refreshState();
        setInterval(pollLog, 1500);
        setInterval(refreshState, 5000);
      } catch (e) {
        document.getElementById('step-status').textContent = t('error') + ': ' + e.message;
        document.getElementById('step-status').classList.remove('hidden');
      }
    }
    init();
  </script>
</body>
</html>
