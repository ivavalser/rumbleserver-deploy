<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rumble Server — Installer</title>
  <style>
    :root {
      --bg: #0f1419; --surface: #1a2332; --surface2: #243044; --border: #2d3a4f;
      --text: #e7ecf3; --muted: #8b9cb3; --accent: #3b82f6; --accent-hover: #2563eb;
      --ok: #22c55e; --err: #ef4444; --radius: 10px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { padding: 20px 24px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
    header h1 { margin: 0 0 4px; font-size: 1.35rem; }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .lang-switch { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
    .lang-switch button { border: none; background: transparent; color: var(--muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .lang-switch button.active { background: var(--accent); color: #fff; }
    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 76px); }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .sidebar { border-right: none; border-bottom: 1px solid var(--border); } }
    .sidebar { padding: 16px; border-right: 1px solid var(--border); background: var(--surface); }
    .step-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius); margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; }
    .step-item:hover { background: var(--surface2); }
    .step-item.active { background: var(--surface2); border-color: var(--accent); }
    .step-dot { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; background: var(--border); color: var(--muted); }
    .step-item.done .step-dot { background: var(--ok); color: #052e16; }
    .step-item.error .step-dot { background: var(--err); color: #fff; }
    .step-item.active .step-dot { background: var(--accent); color: #fff; }
    .step-title { font-size: 0.92rem; font-weight: 600; }
    .step-desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    main { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .panel h2 { margin: 0 0 8px; font-size: 1.15rem; }
    .panel p.desc { margin: 0 0 16px; color: var(--muted); font-size: 0.9rem; }
    .status { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.45; }
    .status.ok { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.35); }
    .status.fail { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.35); }
    .status.info { background: rgba(59,130,246,.12); border: 1px solid rgba(59,130,246,.35); }
    .manual { background: #111827; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.82rem; white-space: pre-wrap; margin-bottom: 16px; color: #cbd5e1; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    button.btn { border: none; border-radius: 8px; padding: 10px 16px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    button.primary { background: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-hover); }
    button.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover { background: var(--border); }
    button.btn:disabled { opacity: .55; cursor: not-allowed; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 16px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; color: var(--muted); }
    input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 0.9rem; }
    input:focus { outline: 2px solid rgba(59,130,246,.45); border-color: var(--accent); }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 8px 0 12px; color: var(--text); font-size: 0.9rem; }
    .checkbox-row input { width: auto; }
    .log { flex: 1; background: #0b0f14; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.78rem; overflow: auto; white-space: pre-wrap; color: #94a3b8; max-height: 320px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="hdr-title">Rumble Server — Installer</h1>
      <p id="install-dir">Loading...</p>
    </div>
    <div class="lang-switch">
      <button type="button" id="lang-en" class="active">EN</button>
      <button type="button" id="lang-ru">RU</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar"><div id="step-list"></div></aside>
    <main>
      <section class="panel" id="step-panel">
        <h2 id="step-title">Loading</h2>
        <p class="desc" id="step-desc"></p>
        <div id="step-status" class="status info hidden"></div>
        <div id="step-manual" class="manual hidden"></div>
        <div id="step-form" class="hidden"></div>
        <div class="actions" id="step-actions"></div>
      </section>
      <section class="panel">
        <h3 id="log-title">Log</h3>
        <div class="log" id="log"></div>
      </section>
    </main>
  </div>

  <script>
    const UI = {
      en: {
        title: 'Rumble Server — Installer',
        loading: 'Loading...',
        directory: 'Directory',
        log: 'Log',
        hint: 'Click "Run automatically" or verify manually.',
        runAuto: 'Run automatically',
        verify: "I've done it — verify",
        skip: 'Skip (I\'ll do it myself)',
        next: 'Next step →',
        finish: 'Finish installation',
        finishConfirm: 'Stop the installer? Port 8800 will be closed.',
        shuttingDown: 'Installer is shutting down. You can close this tab.',
        noToken: 'Token required in URL: ?token=...',
        error: 'Error',
        ghcrKey: 'GHCR key',
        ghcrKeyPh: 'Key from maintainer',
        ghcrUser: 'GHCR user',
        domain: 'Domain (FQDN)',
        externalDb: 'External PostgreSQL',
        externalRedis: 'External Redis',
        awsOptional: 'AWS S3 (optional)',
        strongPassword: 'Strong password',
        domainLabel: 'Domain',
        certbotEmail: "Email for Let's Encrypt",
        checkDns: 'Check DNS',
      },
      ru: {
        title: 'Rumble Server — установщик',
        loading: 'Загрузка...',
        directory: 'Директория',
        log: 'Лог',
        hint: 'Нажми «Выполнить автоматически» или проверь вручную.',
        runAuto: 'Выполнить автоматически',
        verify: 'Я сделал — проверить',
        skip: 'Пропустить (сделаю сам)',
        next: 'Следующий шаг →',
        finish: 'Завершить установку',
        finishConfirm: 'Завершить установщик? Порт 8800 будет закрыт.',
        shuttingDown: 'Установщик останавливается. Можно закрыть вкладку.',
        noToken: 'Нужен token в URL: ?token=...',
        error: 'Ошибка',
        ghcrKey: 'Ключ GHCR',
        ghcrKeyPh: 'Ключ от мейнтейнера',
        ghcrUser: 'Пользователь GHCR',
        domain: 'Домен (FQDN)',
        externalDb: 'Внешняя PostgreSQL',
        externalRedis: 'Внешний Redis',
        awsOptional: 'AWS S3 (опционально)',
        strongPassword: 'Сильный пароль',
        domainLabel: 'Домен',
        certbotEmail: 'Email для Let\'s Encrypt',
        checkDns: 'Проверить DNS',
      },
    };

    const STEPS_I18N = {
      en: {
        system: { title: 'System check', desc: 'Ubuntu/Debian, root, python3' },
        ufw: { title: 'Firewall (UFW)', desc: 'Ports 22, 80, 443' },
        docker: { title: 'Docker', desc: 'Docker Engine + Compose plugin' },
        ghcr: { title: 'Image access (GHCR)', desc: 'Key from maintainer' },
        env: { title: '.env configuration', desc: 'Domain, passwords, AWS' },
        deploy: { title: 'Deploy', desc: 'docker compose pull && up -d' },
        superuser: { title: 'Django Admin', desc: 'First superuser' },
        nginx: { title: 'Nginx + HTTPS', desc: "Reverse proxy and Let's Encrypt" },
        finish: { title: 'Done', desc: 'Installation summary' },
      },
      ru: {
        system: { title: 'Проверка системы', desc: 'Ubuntu/Debian, root, python3' },
        ufw: { title: 'Firewall (UFW)', desc: 'Порты 22, 80, 443' },
        docker: { title: 'Docker', desc: 'Docker Engine + Compose plugin' },
        ghcr: { title: 'Доступ к образу (GHCR)', desc: 'Ключ от мейнтейнера' },
        env: { title: 'Конфигурация .env', desc: 'Домен, пароли, AWS' },
        deploy: { title: 'Деплой', desc: 'docker compose pull && up -d' },
        superuser: { title: 'Django Admin', desc: 'Первый суперпользователь' },
        nginx: { title: 'Nginx + HTTPS', desc: "Reverse proxy и Let's Encrypt" },
        finish: { title: 'Готово', desc: 'Сводка установки' },
      },
    };

    let lang = localStorage.getItem('installer_lang') || 'en';
    const params = new URLSearchParams(location.search);
    const TOKEN = params.get('token') || '';
    let state = null, currentStepId = null, logOffset = 0, busy = false, lastFormStepId = null;

    function t(k) { return (UI[lang] && UI[lang][k]) || UI.en[k] || k; }
    function stepMeta(id) { return (STEPS_I18N[lang] && STEPS_I18N[lang][id]) || STEPS_I18N.en[id] || { title: id, desc: '' }; }
    function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function setLang(l) {
      lang = l;
      localStorage.setItem('installer_lang', l);
      document.documentElement.lang = l;
      document.getElementById('lang-en').classList.toggle('active', l === 'en');
      document.getElementById('lang-ru').classList.toggle('active', l === 'ru');
      document.getElementById('hdr-title').textContent = t('title');
      document.getElementById('log-title').textContent = t('log');
      lastFormStepId = null;
      if (state) { renderStepList(); renderCurrentStep(); }
    }

    document.getElementById('lang-en').onclick = () => setLang('en');
    document.getElementById('lang-ru').onclick = () => setLang('ru');

    function api(path, options = {}) {
      const url = new URL(path, location.origin);
      if (TOKEN) url.searchParams.set('token', TOKEN);
      const headers = { ...(options.headers || {}) };
      if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
      return fetch(url, { ...options, headers });
    }

    async function refreshState() {
      const res = await api('/api/state');
      if (!res.ok) throw new Error(t('error'));
      state = await res.json();
      document.getElementById('install-dir').textContent = t('directory') + ': ' + state.install_dir;
      if (!currentStepId) currentStepId = state.current_step;
      renderStepList();
      renderCurrentStep();
    }

    async function pollLog() {
      try {
        const res = await api('/api/log?offset=' + logOffset);
        const data = await res.json();
        if (data.lines && data.lines.length) {
          const filtered = data.lines.filter(l => !l.startsWith('[http]'));
          if (filtered.length) {
            const logEl = document.getElementById('log');
            logEl.textContent += filtered.join('\n') + '\n';
            logEl.scrollTop = logEl.scrollHeight;
          }
          logOffset = data.total;
        }
      } catch (_) {}
    }

    function renderStepList() {
      const el = document.getElementById('step-list');
      el.innerHTML = '';
      state.steps.forEach((step, idx) => {
        const meta = stepMeta(step.id);
        const div = document.createElement('div');
        div.className = 'step-item' + (step.id === currentStepId ? ' active' : '') + (step.status === 'done' ? ' done' : '') + (step.status === 'error' ? ' error' : '');
        div.onclick = () => { currentStepId = step.id; lastFormStepId = null; renderStepList(); renderCurrentStep(); };
        div.innerHTML = '<div class="step-dot">' + (step.status === 'done' ? '✓' : (idx + 1)) + '</div>' +
          '<div><div class="step-title">' + esc(meta.title) + '</div><div class="step-desc">' + esc(meta.desc) + '</div></div>';
        el.appendChild(div);
      });
    }

    function renderCurrentStep() {
      const step = state.steps.find(s => s.id === currentStepId);
      if (!step) return;
      const meta = stepMeta(step.id);
      document.getElementById('step-title').textContent = meta.title;
      document.getElementById('step-desc').textContent = meta.desc;
      const statusEl = document.getElementById('step-status');
      statusEl.classList.remove('hidden', 'ok', 'fail', 'info');
      if (step.message) {
        statusEl.textContent = step.message;
        statusEl.classList.add(step.status === 'done' ? 'ok' : 'fail');
      } else {
        statusEl.textContent = t('hint');
        statusEl.classList.add('info');
      }
      const manualEl = document.getElementById('step-manual');
      if (step.manual) {
        manualEl.classList.remove('hidden');
        manualEl.textContent = (step.cwd ? '# cwd: ' + step.cwd + '\n\n' : '') + step.manual;
      } else manualEl.classList.add('hidden');
      if (lastFormStepId !== step.id) {
        renderForm(step);
        lastFormStepId = step.id;
      }
      renderActions(step);
    }

    function renderForm(step) {
      const formEl = document.getElementById('step-form');
      formEl.innerHTML = '';
      formEl.classList.add('hidden');
      const d = state.defaults || {};

      if (step.id === 'ghcr') {
        formEl.classList.remove('hidden');
        formEl.innerHTML = `<div class="form-grid">
          <label>${t('ghcrKey')}<input type="text" id="ghcr_key" autocomplete="off" placeholder="${t('ghcrKeyPh')}"></label>
          <label>${t('ghcrUser')}<input type="text" id="ghcr_user" autocomplete="off" value="rmbldeploy"></label></div>`;
        return;
      }
      if (step.id === 'env') {
        formEl.classList.remove('hidden');
        formEl.innerHTML = `<div class="form-grid">
          <label>${t('domain')}<input type="text" id="domain" value="${esc(d.domain || state.domain || '')}" placeholder="api.example.com"></label>
          <label>ALLOWED_HOSTS<input type="text" id="allowed_hosts" value="${esc(d.allowed_hosts || '')}"></label>
          <label>DB_PASS<input type="text" id="db_pass" value="${esc(d.db_pass || '')}"></label>
          <label>REDIS_PASSWORD<input type="text" id="redis_password" value="${esc(d.redis_password || '')}"></label>
          <label>SECRET_KEY<input type="text" id="secret_key" value="${esc(d.secret_key || '')}"></label></div>
          <div class="checkbox-row"><input type="checkbox" id="use_external_db" ${d.use_external_db ? 'checked' : ''}>
          <label for="use_external_db" style="color:var(--text)">${t('externalDb')}</label></div>
          <div class="form-grid"><label>DB_HOST<input type="text" id="db_host" value="${esc(d.db_host || 'db')}"></label>
          <label>DB_PORT<input type="text" id="db_port" value="${esc(d.db_port || '5432')}"></label>
          <label>DB_NAME<input type="text" id="db_name" value="${esc(d.db_name || 'rumbleserver_db')}"></label>
          <label>DB_USER<input type="text" id="db_user" value="${esc(d.db_user || 'rumbleserver_user')}"></label></div>
          <div class="checkbox-row"><input type="checkbox" id="use_external_redis" ${d.use_external_redis ? 'checked' : ''}>
          <label for="use_external_redis" style="color:var(--text)">${t('externalRedis')}</label></div>
          <div class="form-grid"><label>REDIS_HOST<input type="text" id="redis_host" value="${esc(d.redis_host || 'redis')}"></label>
          <label>REDIS_PORT<input type="text" id="redis_port" value="${esc(d.redis_port || '6379')}"></label></div>
          <details style="margin-top:8px;color:var(--muted);font-size:.85rem"><summary>${t('awsOptional')}</summary>
          <div class="form-grid" style="margin-top:10px">
          <label>AWS_ACCESS_KEY_ID<input type="text" id="aws_access_key_id" value="${esc(d.aws_access_key_id || '')}"></label>
          <label>AWS_SECRET_ACCESS_KEY<input type="password" id="aws_secret_access_key" value="${esc(d.aws_secret_access_key || '')}"></label>
          <label>AWS_STORAGE_BUCKET_NAME<input type="text" id="aws_storage_bucket_name" value="${esc(d.aws_storage_bucket_name || '')}"></label>
          <label>AWS_S3_REGION_NAME<input type="text" id="aws_s3_region_name" value="${esc(d.aws_s3_region_name || 'eu-north-1')}"></label></div></details>`;
        const domainInput = formEl.querySelector('#domain');
        const allowedInput = formEl.querySelector('#allowed_hosts');
        domainInput.addEventListener('input', () => { if (!allowedInput.dataset.touched) allowedInput.value = domainInput.value; });
        allowedInput.addEventListener('input', () => { allowedInput.dataset.touched = '1'; });
        return;
      }
      if (step.id === 'superuser') {
        formEl.classList.remove('hidden');
        formEl.innerHTML = `<div class="form-grid">
          <label>Username<input type="text" id="admin_username" value="${esc(state.admin_username || 'admin')}"></label>
          <label>Email<input type="email" id="admin_email" placeholder="admin@example.com"></label>
          <label>Password<input type="password" id="admin_password" placeholder="${t('strongPassword')}"></label></div>`;
        return;
      }
      if (step.id === 'nginx') {
        formEl.classList.remove('hidden');
        formEl.innerHTML = `<div class="form-grid">
          <label>${t('domainLabel')}<input type="text" id="nginx_domain" value="${esc(state.domain || d.domain || '')}" readonly></label>
          <label>${t('certbotEmail')}<input type="email" id="certbot_email" placeholder="you@example.com"></label></div>
          <div class="actions" style="margin:0"><button class="btn secondary" type="button" id="dns-check-btn">${t('checkDns')}</button></div>`;
        formEl.querySelector('#dns-check-btn').onclick = () => runAction('check', true, true);
        return;
      }
      if (step.id === 'finish') {
        formEl.classList.remove('hidden');
        formEl.innerHTML = `<div class="manual">${esc(step.message || '')}</div>`;
      }
    }

    function collectPayload(stepId) {
      const g = id => document.getElementById(id);
      if (stepId === 'ghcr') return { ghcr_key: g('ghcr_key')?.value || '', ghcr_user: g('ghcr_user')?.value || 'rmbldeploy' };
      if (stepId === 'env') return {
        domain: g('domain')?.value || '', allowed_hosts: g('allowed_hosts')?.value || '',
        db_pass: g('db_pass')?.value || '', redis_password: g('redis_password')?.value || '',
        secret_key: g('secret_key')?.value || '', use_external_db: g('use_external_db')?.checked || false,
        use_external_redis: g('use_external_redis')?.checked || false, db_host: g('db_host')?.value || '',
        db_port: g('db_port')?.value || '', db_name: g('db_name')?.value || '', db_user: g('db_user')?.value || '',
        redis_host: g('redis_host')?.value || '', redis_port: g('redis_port')?.value || '',
        aws_access_key_id: g('aws_access_key_id')?.value || '', aws_secret_access_key: g('aws_secret_access_key')?.value || '',
        aws_storage_bucket_name: g('aws_storage_bucket_name')?.value || '', aws_s3_region_name: g('aws_s3_region_name')?.value || '',
      };
      if (stepId === 'superuser') return { admin_username: g('admin_username')?.value || '', admin_email: g('admin_email')?.value || '', admin_password: g('admin_password')?.value || '' };
      if (stepId === 'nginx') return { certbot_email: g('certbot_email')?.value || '', domain: g('nginx_domain')?.value || '' };
      return {};
    }

    function renderActions(step) {
      const actions = document.getElementById('step-actions');
      actions.innerHTML = '';
      if (step.id === 'finish') { actions.appendChild(mkBtn(t('finish'), 'primary', finishInstaller)); return; }
      actions.appendChild(mkBtn(t('runAuto'), 'primary', () => runAction('apply')));
      actions.appendChild(mkBtn(t('verify'), 'secondary', () => runAction('check')));
      actions.appendChild(mkBtn(t('skip'), 'secondary', () => runAction('skip')));
      if (step.status === 'done') {
        actions.appendChild(mkBtn(t('next'), 'secondary', () => {
          const idx = state.steps.findIndex(s => s.id === step.id);
          if (idx < state.steps.length - 1) { currentStepId = state.steps[idx + 1].id; lastFormStepId = null; renderStepList(); renderCurrentStep(); }
        }));
      }
    }

    function mkBtn(text, cls, handler) {
      const b = document.createElement('button');
      b.textContent = text; b.className = 'btn ' + cls; b.disabled = busy; b.onclick = handler;
      return b;
    }

    async function runAction(action, dnsOnly = false, silent = false) {
      if (busy) return;
      busy = true; renderCurrentStep();
      try {
        if (dnsOnly && currentStepId === 'nginx') {
          showActionResult(await (await api('/api/step/nginx/dns-check')).json(), silent);
          return;
        }
        const res = await api('/api/step/' + currentStepId + '/' + action, { method: 'POST', body: JSON.stringify(collectPayload(currentStepId)) });
        showActionResult(await res.json(), silent);
        await refreshState();
      } catch (e) { if (!silent) alert(t('error') + ': ' + e.message); }
      finally { busy = false; renderCurrentStep(); }
    }

    function showActionResult(data, silent) {
      const statusEl = document.getElementById('step-status');
      statusEl.classList.remove('hidden', 'ok', 'fail', 'info');
      statusEl.textContent = data.message || (data.ok ? 'OK' : t('error'));
      statusEl.classList.add(data.ok ? 'ok' : 'fail');
      const manualEl = document.getElementById('step-manual');
      if (data.manual) {
        manualEl.classList.remove('hidden');
        manualEl.textContent = (data.cwd ? '# cwd: ' + data.cwd + '\n\n' : '') + data.manual;
        if (!silent && !data.ok) manualEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    async function finishInstaller() {
      if (!confirm(t('finishConfirm'))) return;
      await api('/api/finish', { method: 'POST', body: '{}' });
      const statusEl = document.getElementById('step-status');
      statusEl.textContent = t('shuttingDown');
      statusEl.classList.remove('hidden');
    }

    async function init() {
      setLang(lang);
      if (!TOKEN) { document.body.innerHTML = '<div style="padding:40px;color:#ef4444">' + t('noToken') + '</div>'; return; }
      try {
        await refreshState();
        setInterval(pollLog, 1500);
        setInterval(refreshState, 5000);
      } catch (e) {
        document.getElementById('step-status').textContent = t('error') + ': ' + e.message;
        document.getElementById('step-status').classList.remove('hidden');
      }
    }
    init();
  </script>
</body>
</html>
